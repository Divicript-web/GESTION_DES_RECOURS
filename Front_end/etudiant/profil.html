<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Étudiant - ULPGL Recours</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="profil.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header class="navbar">
    <div class="nav-left">
        <img src="../assets/logo-ulpgl.png" alt="Logo ULPGL" class="nav-logo">
        <div class="nav-brand">
            <h1>ULPGL-Goma</h1>
            <p>Gestion des Recours Académiques</p>
        </div>
    </div>
    <div class="nav-right">
        <nav class="admin-nav" style="margin-right: 20px;">
            <a href="dashboard.html" style="color: white; text-decoration: none; font-weight: 500;">
                <i class="fa-solid fa-arrow-left"></i> Retour au Dashboard
            </a>
        </nav>

        <div class="user-profile">
            <i class="fa-solid fa-circle-user profile-icon"></i>
            <div class="user-info">
                <span class="user-name">Jérémie NGBAPE</span>
                <span class="user-role">Matricule : 23312</span>
            </div>
        </div>
        
        <a href="#" class="btn-logout" id="logoutTrigger" title="Se déconnecter">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
        </a>
    </div>
</header>

    <div class="dashboard-container">
        <section class="profile-section profile-info-section">
            <h3 class="section-title"><i class="fa-solid fa-id-card"></i> Informations du profil</h3>

            <div id="profileAlert" class="profile-alert" style="display: none;"></div>

            <div class="profile-grid">
                <div class="profile-field">
                    <strong>Nom complet</strong>
                    <span id="profileFullName">Chargement...</span>
                </div>
                <div class="profile-field">
                    <strong>Matricule</strong>
                    <span id="profileMatricule">-</span>
                </div>
                <div class="profile-field">
                    <strong>Rôle</strong>
                    <span id="profileRole">-</span>
                </div>
                <div class="profile-field">
                    <strong>Département</strong>
                    <span id="profileDepartement">-</span>
                </div>
                <div class="profile-field">
                    <strong>Promotion</strong>
                    <span id="profilePromotion">-</span>
                </div>
            </div>
        </section>

        <section class="profile-section">
            <h3 class="section-title"><i class="fa-solid fa-lock"></i> Sécurité du compte</h3>
            
            <form id="passwordForm">
                <div class="input-wrapper">
                    <label for="pass1">Mot de passe actuel</label>
                    <input type="password" id="pass1" placeholder="••••••••" required>
                    <i class="fa-solid fa-eye toggle-password" data-password-toggle="pass1"></i>
                </div>
                
                <div class="input-wrapper">
                    <label for="pass2">Nouveau mot de passe</label>
                    <input type="password" id="pass2" placeholder="••••••••" required>
                    <i class="fa-solid fa-eye toggle-password" data-password-toggle="pass2"></i>
                </div>

                <div class="input-wrapper">
                    <label for="pass3">Confirmer le nouveau mot de passe</label>
                    <input type="password" id="pass3" placeholder="••••••••" required>
                    <i class="fa-solid fa-eye toggle-password" data-password-toggle="pass3"></i>
                </div>

                <button class="btn-save" type="submit">Enregistrer les modifications</button>
            </form>
        </section>
    </div>

    <div id="logoutModal" class="logout-modal">
        <div class="logout-modal-content">
            <div class="logout-modal-icon"><i class="fa-solid fa-arrow-right-from-bracket"></i></div>
            <h3>Confirmation</h3>
            <p>Voulez-vous vraiment vous déconnecter ?</p>
            <div class="logout-modal-actions">
                <button type="button" class="btn-modal-cancel" id="btnCancelLogout">Annuler</button>
                <a href="../login.html" class="btn-modal-confirm" id="confirmLogout">Se déconnecter</a>
            </div>
        </div>
    </div>

    <script src="profil.js"></script>
</body>
</html>
