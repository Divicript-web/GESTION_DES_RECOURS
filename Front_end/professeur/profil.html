<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sécurité - Espace Enseignant</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .input-wrapper { position: relative; margin-bottom: 20px; }
        .toggle-password { position: absolute; right: 15px; top: 40px; cursor: pointer; color: #64748b; }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-left">
            <img src="../assets/logo-ulpgl.png" alt="Logo ULPGL" class="nav-logo">
            <div class="nav-brand">
                <h1>ULPGL-Goma</h1>
                <p>Espace Enseignant</p>
            </div>
        </div>
        <div class="nav-right">
            <nav class="admin-nav">
                <a href="dashboard.html">Dashboard</a>
                <a href="historique.html">Historique</a>
                <a href="cours.html">Mes Cours</a>
                <a href="profil.html" class="active">Profil</a>
            </nav>
            <div class="user-profile">
                <i class="fa-solid fa-chalkboard-user"></i>
                <span>Prof. KASONGO</span>
                <button type="button" id="logoutTrigger" class="btn-logout-small">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>
        </div>
    </header>

    <div class="dashboard-container">
        <section class="table-section" style="max-width: 500px; margin: 0 auto;">
            <h3 style="text-align: center;">Sécurité du compte</h3>
            <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 25px; text-align: center;">
                Modifiez votre mot de passe pour garantir l'accès sécurisé à votre espace.
            </p>
            
            <div class="form-wrapper">
                <div class="input-wrapper">
                    <label style="font-weight: 600; font-size: 0.85rem;">Mot de passe actuel</label>
                    <input type="password" id="pass1" placeholder="Entrez votre mot de passe actuel" style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;">
                    <i class="fa-solid fa-eye toggle-password" onclick="togglePass('pass1', this)"></i>
                </div>
                
                <div class="input-wrapper">
                    <label style="font-weight: 600; font-size: 0.85rem;">Nouveau mot de passe</label>
                    <input type="password" id="pass2" placeholder="Minimum 8 caractères" style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;">
                    <i class="fa-solid fa-eye toggle-password" onclick="togglePass('pass2', this)"></i>
                </div>

                <div class="input-wrapper">
                    <label style="font-weight: 600; font-size: 0.85rem;">Confirmer le nouveau mot de passe</label>
                    <input type="password" id="pass3" placeholder="Répétez le nouveau mot de passe" style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;">
                    <i class="fa-solid fa-eye toggle-password" onclick="togglePass('pass3', this)"></i>
                </div>

                <button class="btn-action" style="width: 100%; padding: 12px; margin-top: 10px; cursor: pointer;">Enregistrer les modifications</button>
            </div>
        </section>
    </div>

    <div id="logoutModal" class="logout-modal">
        <div class="logout-modal-content">
            <i class="fa-solid fa-arrow-right-from-bracket" style="font-size: 2rem; color: #dc2626; margin-bottom: 15px;"></i>
            <h3>Confirmation</h3>
            <p>Voulez-vous vraiment vous déconnecter ?</p>
            <div class="logout-modal-actions">
                <button type="button" class="btn-modal-cancel" id="btnCancelLogout">Annuler</button>
                <a href="../login.html" class="btn-modal-confirm">Se déconnecter</a>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
    <script>
        function togglePass(id, icon) {
            const input = document.getElementById(id);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }
    </script>
</body>
</html>
